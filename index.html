<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Railway Drawer</title>
  </head>
  <body>
    <div id="app-container">
      <!-- Top Bar -->
      <div class="top-bar">
        <!-- Logo & Title -->
        <div class="top-bar-left">
          <div class="logo">🚂</div>
          <h1 class="document-title">Untitled Diagram</h1>
        </div>

        <!-- Menu Bar -->
        <div id="menu-bar" class="menu-bar">
          <button class="menu-item">File</button>
          <button class="menu-item">Edit</button>
          <button class="menu-item">View</button>
          <button class="menu-item">Arrange</button>
          <button class="menu-item">Extras</button>
          <button class="menu-item">Help</button>
        </div>

        <!-- Save Status & Share -->
        <div class="top-bar-right">
          <div class="save-status">Unsaved changes. Click here to save.</div>
          <button class="share-btn">👤 Share</button>
        </div>
      </div>

      <!-- Toolbar -->
      <div id="toolbar-container" class="toolbar">
        <!-- Left Section: View & Navigation -->
        <div class="toolbar-section">
          <div class="zoom-control">
            <button class="toolbar-btn" title="Zoom out">−</button>
            <select class="zoom-select" id="zoom-level">
              <option value="50">50%</option>
              <option value="75">75%</option>
              <option value="100">100%</option>
              <option value="150">150%</option>
              <option value="200">200%</option>
            </select>
            <button class="toolbar-btn" title="Zoom in">+</button>
          </div>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" title="Pan left">‹</button>
          <button class="toolbar-btn" title="Pan right">›</button>
        </div>

        <!-- Center Section: Edit Tools -->
        <div class="toolbar-section">
          <button class="toolbar-btn" id="btn-undo" title="Undo">↺</button>
          <button class="toolbar-btn" id="btn-redo" title="Redo">↻</button>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" title="Delete">🗑</button>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" title="Draw rectangle">▭</button>
          <button class="toolbar-btn" title="Draw ellipse">●</button>
          <button class="toolbar-btn" title="Draw diamond">◆</button>
          <button class="toolbar-btn" title="Draw line">—</button>
          <button class="toolbar-btn" title="Draw connector">↗</button>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" title="Add element">+</button>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" title="Grid">⊞</button>
          <button class="toolbar-btn" title="Format painter">🎨</button>
          <button class="toolbar-btn" title="Align">⊞⊡</button>
          <button class="toolbar-btn" title="Distribute">≣</button>
        </div>

        <!-- Right Section: View Options -->
        <div class="toolbar-section">
          <button class="toolbar-btn" title="Fullscreen">⛶</button>
          <button class="toolbar-btn" title="More options">⋮</button>
        </div>
      </div>

      <!-- Main Workspace -->
      <div id="workspace" class="workspace">
        <!-- Left Panel -->
        <div id="leftpanel-container" class="left-panel">
          <!-- Tab bar will be inserted here by LeftPanelTabs -->
          <div id="stencils-container" class="panel-content"></div>
          <div id="shapes-container" class="panel-content"></div>
        </div>

        <!-- Graph Canvas -->
        <div id="graph-container" class="canvas-container"></div>

        <!-- Right Panel -->
        <div id="rightpanel-container" class="right-panel">
          <div class="panel-header">Properties</div>
          <div id="property-content" class="panel-content">
            <p style="color: #999; font-size: 12px; padding: 12px;">Click element to edit</p>
          </div>
        </div>
      </div>

      <!-- Tab Bar -->
      <div id="tabs-container"></div>

      <!-- Status Bar -->
      <div id="statusbar-container" class="status-bar">
        <div class="status-message" id="status-message">Ready</div>
        <div class="status-items">
          <div class="status-item">
            <span class="status-label">Zoom:</span>
            <span class="status-value" id="status-zoom">100%</span>
          </div>
          <div class="status-item">
            <span class="status-label">Selected:</span>
            <span class="status-value" id="status-selected">0</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
