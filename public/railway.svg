<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradient for visibility in dark theme -->
  <defs>
    <linearGradient id="railGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sleepersGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle (optional, comment out if not needed) -->
  <circle cx="128" cy="128" r="125" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
  
  <!-- Left rail (curved) -->
  <path d="M 50 80 Q 128 70 200 100 Q 220 110 230 140" 
        stroke="url(#railGradient)" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Right rail (curved) -->
  <path d="M 50 130 Q 128 140 200 150 Q 220 158 230 180" 
        stroke="url(#railGradient)" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Sleepers (railroad ties) connecting the rails -->
  <g stroke="url(#sleepersGradient)" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="60" y1="100" x2="68" y2="128"/>
    <line x1="100" y1="90" x2="108" y2="130"/>
    <line x1="140" y1="88" x2="148" y2="138"/>
    <line x1="180" y1="105" x2="188" y2="155"/>
    <line x1="210" y1="130" x2="218" y2="172"/>
  </g>
  
  <!-- Small accent detail (drawing symbol) -->
  <circle cx="100" cy="80" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="160" cy="160" r="6" fill="#f97316" opacity="0.8"/>
  <circle cx="220" cy="120" r="4" fill="#fbbf24" opacity="0.7"/>
</svg>
